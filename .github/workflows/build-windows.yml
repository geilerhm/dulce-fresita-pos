name: Build Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify better-sqlite3 ABI
        shell: cmd
        run: node -e "console.log('Node ABI:', process.versions.modules)"

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TURBOPACK: "0"

      - name: Fix native modules in standalone
        shell: bash
        run: |
          echo "=== Node ABI ==="
          node -e "console.log('ABI:', process.versions.modules)"
          echo "=== Remove .next/node_modules native copies (wrong ABI) ==="
          find .next/standalone/.next/node_modules -name "*.node" -type f 2>/dev/null | while read f; do echo "DELETE: $f"; rm "$f"; done
          echo "=== Copy correct binaries from root node_modules ==="
          find .next/standalone/node_modules -name "better_sqlite3.node" -type f 2>/dev/null | head -3
          echo "=== Test root module ==="
          node -e "require('.next/standalone/node_modules/better-sqlite3'); console.log('better-sqlite3: OK')" || echo "better-sqlite3: FAILED"

      - name: Prepare standalone
        shell: cmd
        run: |
          xcopy /E /I /H /Y ".next\static" ".next\standalone\.next\static"
          xcopy /E /I /H /Y "public" ".next\standalone\public"
          ren ".next\standalone\node_modules" "_node_modules"

      - name: Download portable Node.js
        shell: cmd
        run: |
          curl -Lo node.zip https://nodejs.org/dist/v22.16.0/node-v22.16.0-win-x64.zip
          tar -xf node.zip
          mkdir ".next\standalone\_portable_node"
          copy "node-v22.16.0-win-x64\node.exe" ".next\standalone\_portable_node\node.exe"

      - name: Build Electron (skip native module rebuild)
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
