name: Build Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TURBOPACK: "0"

      - name: Prepare standalone
        shell: cmd
        run: |
          xcopy /E /I /H /Y ".next\static" ".next\standalone\.next\static"
          xcopy /E /I /H /Y "public" ".next\standalone\public"
          echo === Rename node_modules to bypass electron-builder filter ===
          ren ".next\standalone\node_modules" "_node_modules"
          dir ".next\standalone"
          dir ".next\standalone\_node_modules" /B | findstr /C:"next"

      - name: Build Electron & Publish
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish draft release
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
