name: Build Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.16.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build Next.js FIRST (while native modules are compiled for Node 22)
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TURBOPACK: "0"

      # Now rebuild native modules for Electron (only affects main node_modules)
      - name: Rebuild native modules for Electron
        run: npx electron-builder install-app-deps

      - name: Prepare standalone
        shell: cmd
        run: |
          xcopy /E /I /H /Y ".next\static" ".next\standalone\.next\static"
          xcopy /E /I /H /Y "public" ".next\standalone\public"
          ren ".next\standalone\node_modules" "_node_modules"

      - name: Download portable Node.js
        shell: cmd
        run: |
          curl -Lo node.zip https://nodejs.org/dist/v22.16.0/node-v22.16.0-win-x64.zip
          tar -xf node.zip
          mkdir ".next\standalone\_portable_node"
          copy "node-v22.16.0-win-x64\node.exe" ".next\standalone\_portable_node\node.exe"

      - name: Build Electron & Publish
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish draft release
        run: gh release edit ${{ github.ref_name }} --draft=false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
